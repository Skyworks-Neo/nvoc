name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changed components
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      auto_optimizer: ${{ steps.filter.outputs.auto_optimizer }}
      srv: ${{ steps.filter.outputs.srv }}
      tui: ${{ steps.filter.outputs.tui }}
      gui: ${{ steps.filter.outputs.gui }}
      stressor_cuda: ${{ steps.filter.outputs.stressor_cuda }}
      stressor_opencl: ${{ steps.filter.outputs.stressor_opencl }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auto_optimizer:
              - 'auto-optimizer/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
            srv:
              - 'srv/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
            tui:
              - 'tui/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            gui:
              - 'gui/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            stressor_cuda:
              - 'cli-stressor-cuda/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            stressor_opencl:
              - 'cli-stressor-opencl/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

  rust-auto-optimizer:
    name: auto-optimizer (windows)
    needs: changes
    if: needs.changes.outputs.auto_optimizer == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
          rustflags: ""
      - name: Rustfmt
        run: cargo fmt --package nvoc-auto-optimizer -- --check
      - name: Clippy
        run: cargo clippy --package nvoc-auto-optimizer --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --package nvoc-auto-optimizer --all-targets --all-features

  rust-srv:
    name: srv (windows)
    needs: changes
    if: needs.changes.outputs.srv == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt
          rustflags: ""
      - name: Rustfmt
        run: cargo fmt --package nvoc-srv -- --check
      - name: Clippy
        run: cargo clippy --package nvoc-srv --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --package nvoc-srv --all-targets --all-features

  python-tui:
    name: tui (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.tui == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        run: pip install --quiet uv
      - name: Install deps
        run: uv pip install --system -e '.[dev]'
        working-directory: tui
      - name: byte-compile
        run: python -m compileall -q tui/
      - name: ruff (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check tui/
      - name: non-GPU unit tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q tui/tests/

  python-gui:
    name: gui (sync + import smoke)
    needs: changes
    if: needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install --quiet uv
      - name: Install deps
        run: uv pip install --system -e '.[dev]'
        working-directory: gui
      - name: byte-compile gui/
        run: python -m compileall -q gui/
      - name: ruff (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check gui/

  python-stressor-cuda:
    name: stressor compile (cli-stressor-cuda)
    needs: changes
    if: needs.changes.outputs.stressor_cuda == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: byte-compile
        run: python -m compileall -q test.py
        working-directory: cli-stressor-cuda
      - name: ruff (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check cli-stressor-cuda/test.py
      - name: non-GPU unit tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q test_non_gpu_ci.py
        working-directory: cli-stressor-cuda

  python-stressor-opencl:
    name: stressor compile (cli-stressor-opencl)
    needs: changes
    if: needs.changes.outputs.stressor_opencl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: byte-compile
        run: python -m compileall -q test.py
        working-directory: cli-stressor-opencl
      - name: ruff (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check cli-stressor-opencl/test.py
      - name: non-GPU unit tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q test_non_gpu_ci.py
        working-directory: cli-stressor-opencl

  rust-crate-versions:
    name: Rust duplicate-crate audit
    runs-on: ubuntu-latest
    # Guards against unintentional workspace version skew. The ALLOWLIST below
    # covers expected semver-breaking transitive duplicates; any crate not on
    # the list that appears at multiple versions will fail this job.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check Cargo.lock for duplicate crate versions
        run: |
          python3 << 'PYEOF'
          import sys, tomllib, collections

          # Expected transitive duplicates from semver-breaking upgrades pulled in by
          # different dependency chains.  Add entries only when unavoidable; remove
          # them once the workspace converges on a single version.
          ALLOWLIST = {
              "bitflags",        # 1.x / 2.x
              "getrandom",       # 0.2 / 0.3 / 0.4
              "hashbrown",       # 0.15 / 0.17
              "libloading",      # 0.8.x (nvml-wrapper) / 0.9.x (cudarc)
              "r-efi",           # 5.x / 6.x
              "thiserror",       # 1.x / 2.x
              "thiserror-impl",  # 1.x / 2.x
              "windows-sys",     # 0.52 / 0.59 / 0.61
              "wit-bindgen",     # 0.51 / 0.57
              "zerocopy",        # 0.6 / 0.8
              "zerocopy-derive", # 0.6 / 0.8
          }

          with open('Cargo.lock', 'rb') as f:
              data = tomllib.load(f)
          seen = collections.defaultdict(set)
          for pkg in data.get('package', []):
              seen[pkg['name']].add(pkg['version'])
          dupes = {k: sorted(v) for k, v in seen.items() if len(v) > 1 and k not in ALLOWLIST}
          if dupes:
              print('Unexpected duplicate crate versions found:')
              for name, vers in sorted(dupes.items()):
                  print(f'  {name}: {", ".join(vers)}')
              sys.exit(1)
          print('No unexpected duplicate crate versions found.')
          PYEOF

  ci-summary:
    name: ci summary
    needs:
      - changes
      - rust-auto-optimizer
      - rust-srv
      - rust-crate-versions
      - python-tui
      - python-gui
      - python-stressor-cuda
      - python-stressor-opencl
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: fail if any required job failed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] \
             || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "one or more required CI jobs did not succeed" >&2
            exit 1
          fi
