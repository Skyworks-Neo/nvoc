name: GPU CI

# Runs hardware-dependent checks (CUDA / OpenCL / NVAPI / NVML) on a
# self-hosted runner that has a real NVIDIA GPU. Triggered explicitly to
# avoid burning GPU time on every push.

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      ref:
        description: branch / SHA to test
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: gpu-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    # PR runs require the `ci:gpu` label. Manual dispatch always runs.
    #
    # Fork PRs additionally only run at the moment the label is applied
    # (`labeled` event): a maintainer labeling the PR is the explicit
    # approval for that revision. Without this, labeling a fork PR once
    # would let every later push (`synchronize`) run arbitrary code on the
    # self-hosted GPU runners with no further review. Same-repo PRs keep
    # auto-rerun on push.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'ci:gpu') &&
       ((github.event.action == 'labeled' && github.event.label.name == 'ci:gpu') ||
        github.event.pull_request.head.repo.full_name == github.repository))
    runs-on: ubuntu-latest
    steps:
      - run: echo "gpu-ci approved for ${{ github.event_name }}"

  changes:
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ci_config: ${{ steps.manual.outputs.ci_config || steps.filter.outputs.ci_config }}
      rust_base: ${{ steps.manual.outputs.rust_base || steps.filter.outputs.rust_base }}
      python_base: ${{ steps.manual.outputs.python_base || steps.filter.outputs.python_base }}
      auto_optimizer: ${{ steps.manual.outputs.auto_optimizer || steps.filter.outputs.auto_optimizer }}
      nvoc_core: ${{ steps.manual.outputs.nvoc_core || steps.filter.outputs.nvoc_core }}
      stressor_cuda_rs: ${{ steps.manual.outputs.stressor_cuda_rs || steps.filter.outputs.stressor_cuda_rs }}
      stressor_opencl: ${{ steps.manual.outputs.stressor_opencl || steps.filter.outputs.stressor_opencl }}
    steps:
      - name: run all component jobs for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          {
            echo "ci_config=true"
            echo "rust_base=true"
            echo "python_base=true"
            echo "auto_optimizer=true"
            echo "nvoc_core=true"
            echo "stressor_cuda_rs=true"
            echo "stressor_opencl=true"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        if: github.event_name != 'workflow_dispatch'
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            # Base layers are composed in job-level if: expressions below.
            ci_config:
              - '.github/workflows/gpu-ci.yml'
              - '.github/actions/setup-rust/**'
            rust_base:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - '.cargo/**'
              - '.gitmodules'
              - 'nvapi-rs'
              - 'nvapi-rs/**'
            python_base:
              - 'pyproject.toml'
              - 'uv.lock'
            nvoc_core:
              - 'core/**'
            auto_optimizer:
              - 'auto-optimizer/**'
            stressor_cuda_rs:
              - 'cli-stressor-cuda-rs/**'
            stressor_opencl:
              - 'cli-stressor-opencl/**'

  auto-optimizer-gpu:
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.auto_optimizer == 'true'
    runs-on: [self-hosted, windows, gpu-nvidia]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: auto-optimizer
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
          cache-workspaces: auto-optimizer -> target
      - name: build
        run: cargo build --release
      - name: read-only GPU discovery
        # Read-only NVAPI/NVML calls only. Never run write/overclock paths
        # in CI; those require a human-supervised run on a known-recoverable
        # bench with TDR + recovery configured.
        run: cargo test --release --no-fail-fast -- --include-ignored gpu_readonly_

  nvoc-core-gpu-readonly:
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true'
    runs-on: [self-hosted, windows, gpu-nvidia]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
          cache-workspaces: . -> target
      - name: nvoc-core read-only GPU API tests
        run: cargo test --release --package nvoc-core --test gpu_readonly -- --ignored --test-threads=1
        env:
          NVOC_CORE_GPU_GROUND_TRUTH: ${{ vars.NVOC_CORE_GPU_GROUND_TRUTH }}

  cuda-stressor-rs:
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.stressor_cuda_rs == 'true'
    runs-on: [self-hosted, windows, gpu-nvidia, cuda]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
          cache-workspaces: . -> target
      - name: build CUDA stressor
        run: cargo build --release --package cli-stressor-cuda-rs --features cuda
      - name: short stress run
        run: cargo run --release --package cli-stressor-cuda-rs --features cuda -- --duration 10 --precisions fp32 --matrix-sizes 2048 --kernel-types gemm --disable-fp8

  opencl-stressor-windows:
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.python_base == 'true' ||
      needs.changes.outputs.stressor_opencl == 'true'
    runs-on: [self-hosted, windows, gpu-nvidia, opencl]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: cli-stressor-opencl
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: set uv cache dirs
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "UV_CACHE_DIR=$env:RUNNER_TEMP\uv-cache"
          Add-Content $env:GITHUB_ENV "UV_PROJECT_ENVIRONMENT=$env:RUNNER_TEMP\uv-envs\opencl-stressor-${{ github.run_id }}"
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.19"
          enable-cache: "true"
          cache-dependency-glob: uv.lock
          cache-suffix: opencl
      - run: uv sync --frozen --no-config
        env:
          UV_CACHE_DIR: ${{ runner.temp }}\uv-cache
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}\uv-envs\opencl-stressor-${{ github.run_id }}
      - run: uv run --no-config python test.py
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}\uv-envs\opencl-stressor-${{ github.run_id }}

