name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-fmt:
    name: "ruff format . --check"
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
      - run: ruff format . --preview --check --output-format=github

  ruff-lint:
    name: "ruff check . "
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
      - run: ruff check . --output-format=github

  fmt:
    name: Rustfmt
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      # cli-stressor-cuda-rs links against CUDA even without --all-features; exclude it here.
      # The Rust stressor is compiled separately in ci.yml when files change.
      - run: cargo clippy --workspace --exclude cli-stressor-cuda-rs --all-targets -- -D warnings

  changes:
    name: detect changed components
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ci_config: ${{ steps.filter.outputs.ci_config }}
      rust_base: ${{ steps.filter.outputs.rust_base }}
      python_base: ${{ steps.filter.outputs.python_base }}
      nvoc_core: ${{ steps.filter.outputs.nvoc_core }}
      nvoc_cli: ${{ steps.filter.outputs.nvoc_cli }}
      nvoc_python: ${{ steps.filter.outputs.nvoc_python }}
      auto_optimizer: ${{ steps.filter.outputs.auto_optimizer }}
      srv: ${{ steps.filter.outputs.srv }}
      tui: ${{ steps.filter.outputs.tui }}
      gui: ${{ steps.filter.outputs.gui }}
      stressor_cuda_rs: ${{ steps.filter.outputs.stressor_cuda_rs }}
      stressor_opencl: ${{ steps.filter.outputs.stressor_opencl }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # Base layers are composed in job-level if: expressions below.
            ci_config:
              - '.github/workflows/ci.yml'
              - '.github/actions/setup-rust/**'
            rust_base:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - '.cargo/**'
              - '.gitmodules'
              - 'nvapi-rs'
              - 'nvapi-rs/**'
            python_base:
              - 'pyproject.toml'
              - 'uv.lock'
            nvoc_core:
              - 'core/**'
            nvoc_cli:
              - 'cli/**'
              - 'cli-common/**'
            nvoc_python:
              - 'nvoc-python/**'
            auto_optimizer:
              - 'auto-optimizer/**'
            srv:
              - 'srv/**'
            tui:
              - 'tui/**'
            gui:
              - 'gui/**'
            stressor_cuda_rs:
              - 'cli-stressor-cuda-rs/**'
            stressor_opencl:
              - 'cli-stressor-opencl/**'

  rust-nvoc-core:
    name: nvoc-core tests
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - run: cargo test --package nvoc-core --all-targets

  rust-nvoc-cli:
    name: nvoc-cli tests
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.nvoc_cli == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - run: cargo test --package nvoc-cli --all-targets

  rust-nvoc-python:
    name: nvoc-python tests
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.nvoc_python == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: cargo test --package pynvoc --no-default-features
      - run: python -m pip install --upgrade pip maturin
      - run: python -m venv .venv
        working-directory: nvoc-python
      - run: .venv/bin/python -m pip install --upgrade pip pytest
        working-directory: nvoc-python
      - name: maturin develop
        working-directory: nvoc-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/nvoc-python/.venv
        run: maturin develop --release
      - name: pytest
        working-directory: nvoc-python
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/nvoc-python/.venv
        run: .venv/bin/python -m pytest tests/

  rust-auto-optimizer:
    name: auto-optimizer (windows)
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.auto_optimizer == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - name: Clippy
        run: cargo clippy --package nvoc-auto-optimizer --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --package nvoc-auto-optimizer --all-targets --all-features
      # Hardware-gated tests are #[ignore]d and run separately in gpu-ci.yml;
      # this runs the non-GPU unit tests, which previously never ran in CI.
      - name: Test (non-GPU)
        run: cargo test --package nvoc-auto-optimizer --all-targets --all-features

  rust-srv:
    name: srv (windows)
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.srv == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - name: Clippy
        run: cargo clippy --package nvoc-srv --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --package nvoc-srv --all-targets --all-features

  rust-stressor-cuda-rs:
    name: cli-stressor-cuda-rs (non-CUDA)
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.stressor_cuda_rs == 'true'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - name: Clippy
        run: cargo clippy --package cli-stressor-cuda-rs --all-targets --no-default-features -- -D warnings
      - name: Test
        run: cargo test --package cli-stressor-cuda-rs --all-targets --no-default-features

  python-tui:
    name: tui (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.python_base == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.nvoc_python == 'true' ||
      needs.changes.outputs.tui == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.19"
          enable-cache: "true"
          cache-dependency-glob: uv.lock
          cache-suffix: tui-py${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --locked --package nvoc-tui --group dev --no-config
      - name: byte-compile
        run: uv run --locked --package nvoc-tui --group dev --no-config python -m compileall -q tui/
      - name: ruff (best-effort)
        continue-on-error: true
        run: uv run --locked --package nvoc-tui --group dev --no-config ruff check tui/
      - name: non-GPU unit tests
        run: uv run --locked --package nvoc-tui --group dev --no-config pytest -q tui/tests/

  python-gui:
    name: gui (sync + import smoke)
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.python_base == 'true' ||
      needs.changes.outputs.rust_base == 'true' ||
      needs.changes.outputs.nvoc_core == 'true' ||
      needs.changes.outputs.nvoc_python == 'true' ||
      needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.19"
          enable-cache: "true"
          cache-dependency-glob: uv.lock
          cache-suffix: gui-py3.12
      - name: Install deps
        run: uv sync --locked --package nvoc-gui --group dev --no-config
      - name: byte-compile gui/
        run: uv run --locked --package nvoc-gui --group dev --no-config python -m compileall -q gui/
      - name: ruff (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check gui/
      - name: non-GPU unit tests
        run: uv run --locked --package nvoc-gui --group dev --no-config pytest -q gui/tests/

  python-stressor-opencl:
    name: stressor compile (cli-stressor-opencl)
    needs: changes
    if: >-
      needs.changes.outputs.ci_config == 'true' ||
      needs.changes.outputs.python_base == 'true' ||
      needs.changes.outputs.stressor_opencl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: byte-compile
        run: python -m compileall -q test.py
        working-directory: cli-stressor-opencl
      - name: ruff (best-effort)
        continue-on-error: true
        run: |
          python -m pip install --quiet ruff
          ruff check cli-stressor-opencl/test.py
      - name: non-GPU unit tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest -q test_non_gpu_ci.py
        working-directory: cli-stressor-opencl

  version-consistency:
    name: workspace/package version consistency
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python3 .github/scripts/check-versions.py

  rust-crate-versions:
    name: Rust duplicate-crate audit
    runs-on: ubuntu-latest
    continue-on-error: true
    # Guards against unintentional workspace version skew. The ALLOWLIST below
    # covers expected semver-breaking transitive duplicates; any crate not on
    # the list that appears at multiple versions will fail this job.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check Cargo.lock for duplicate crate versions
        run: |
          python3 << 'PYEOF'
          import sys, tomllib, collections

          # Expected transitive duplicates from semver-breaking upgrades pulled in by
          # different dependency chains.  Add entries only when unavoidable; remove
          # them once the workspace converges on a single version.
          ALLOWLIST = {
              "bitflags",        # 1.x / 2.x
              "colored",         # 2.x via log2 / 3.x workspace CLI styling
              "getrandom",       # 0.2 / 0.3 / 0.4
              "hashbrown",       # 0.15 / 0.17
              "libloading",      # 0.8.x (nvml-wrapper) / 0.9.x (cudarc)
              "r-efi",           # 5.x / 6.x
              "thiserror",       # 1.x / 2.x
              "thiserror-impl",  # 1.x / 2.x
              "windows-sys",     # 0.52 / 0.59 / 0.61
              "wit-bindgen",     # 0.51 / 0.57
              "zerocopy",        # 0.6 / 0.8
              "zerocopy-derive", # 0.6 / 0.8
          }

          with open('Cargo.lock', 'rb') as f:
              data = tomllib.load(f)
          seen = collections.defaultdict(set)
          for pkg in data.get('package', []):
              seen[pkg['name']].add(pkg['version'])
          dupes = {k: sorted(v) for k, v in seen.items() if len(v) > 1 and k not in ALLOWLIST}
          if dupes:
              print('Unexpected duplicate crate versions found:')
              for name, vers in sorted(dupes.items()):
                  print(f'  {name}: {", ".join(vers)}')
              sys.exit(1)
          print('No unexpected duplicate crate versions found.')
          PYEOF

  ci-summary:
    name: ci summary
    needs:
      - ruff-fmt
      - ruff-lint
      - fmt
      - clippy
      - changes
      - rust-nvoc-core
      - rust-nvoc-cli
      - rust-nvoc-python
      - rust-auto-optimizer
      - rust-srv
      - rust-stressor-cuda-rs
      - rust-crate-versions
      - version-consistency
      - python-tui
      - python-gui
      - python-stressor-opencl
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: fail if any required job failed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] \
             || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "one or more required CI jobs did not succeed" >&2
            exit 1
          fi
