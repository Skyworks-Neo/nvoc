name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version. Defaults to the tag name or short SHA.
        required: false
        type: string
  push:
    tags:
      - "v*"

# Build jobs run third-party build tooling (pyinstaller, docker images) and
# must not hold a writable token; only the publish job gets contents: write.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  UV_VERSION: "0.11.19"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-check:
    name: tag / version consistency
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # check-versions.py lands with the audit PR (#225); guard on presence so
      # this workflow is mergeable in either order. Once both are on main the
      # gate is fully active.
      - name: Validate release version and check package versions
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          version=""
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION}"
          elif [ "${REF_TYPE}" = "tag" ]; then
            version="${REF_NAME}"
          fi

          if [ -n "${version}" ] && [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[[:alnum:]_]+(\.[[:alnum:]_]+)*)?$ ]]; then
            echo "Release version must match vX.Y.Z or vX.Y.Z-suffix: ${version}" >&2
            exit 1
          fi

          if [ ! -f .github/scripts/check-versions.py ]; then
            echo "check-versions.py not present yet (lands with #225); skipping"
          elif [ -n "${version}" ]; then
            python3 .github/scripts/check-versions.py --tag "${version}"
          else
            python3 .github/scripts/check-versions.py
          fi
      # Defense in depth, independent of the tag ruleset: never build release
      # artifacts for a tag outside main history.
      - name: Require tag to point into main history
        if: github.ref_type == 'tag'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "Tag ${REF_NAME} is not reachable from origin/main" >&2
            exit 1
          fi

  build:
    needs: version-check
    name: build ${{ matrix.platform }}-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: amd64
            os: ubuntu-22.04
            python-architecture: x64
            shell: bash
          - platform: linux
            arch: arm64
            os: ubuntu-22.04-arm
            python-architecture: arm64
            shell: bash
          - platform: windows
            arch: amd64
            os: windows-2025
            python-architecture: x64
            shell: pwsh
          - platform: windows
            arch: arm64
            os: windows-11-arm
            python-architecture: arm64
            shell: pwsh
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-architecture }}

      - uses: ./.github/actions/setup-rust
        with:
          cache: "true"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: "true"
          cache-dependency-glob: uv.lock
          cache-suffix: release-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_SHA::12}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
        if: matrix.platform == 'linux'

      - name: Resolve release version
        id: version_windows
        run: |
          if ("${{ inputs.version }}") {
            $version = "${{ inputs.version }}"
          } elseif ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = "dev-" + $env:GITHUB_SHA.Substring(0, 12)
          }
          "version=$version" >> $env:GITHUB_OUTPUT
        if: matrix.platform == 'windows'

      - name: Build Rust release binaries
        run: cargo build --release --locked -p nvoc-cli -p nvoc-auto-optimizer -p cli-stressor-cuda-rs --features cuda,vulkan

      - name: Build srv (Windows service)
        if: matrix.platform == 'windows'
        run: cargo build --release --locked -p nvoc-srv

      - name: Build TUI single binary
        working-directory: tui
        run: |
          uv sync --locked --group dev --no-config --no-editable
          uv run --locked --group dev --no-config --no-editable pyinstaller --clean --noconfirm nvoc_tui.spec

      - name: Build GUI single binary
        working-directory: gui
        run: |
          uv sync --locked --group build --no-config --no-editable
          uv run --locked --group build --no-config --no-editable pyinstaller --clean --noconfirm nvoc_gui.spec

      # pyopencl publishes no win_arm64 wheel, so that cell is skipped (the
      # staging script is told via --skip-opencl).
      - name: Build OpenCL stressor single binary
        if: matrix.platform == 'linux' || matrix.arch == 'amd64'
        working-directory: cli-stressor-opencl
        run: |
          uv sync --locked --no-config --no-editable
          uv run --locked --no-config --no-editable pyinstaller --clean --noconfirm cli-stressor-opencl.spec

      - name: Smoke test release CLIs
        run: |
          ./target/release/nvoc-cli --help
          ./target/release/nvoc-auto-optimizer --help
          ./target/release/cli-stressor-cuda-rs --help
        if: matrix.platform == 'linux'

      - name: Smoke test release CLIs
        run: |
          .\target\release\nvoc-cli.exe --help
          .\target\release\nvoc-auto-optimizer.exe --help
          .\target\release\cli-stressor-cuda-rs.exe --help
        if: matrix.platform == 'windows'

      - name: Stage Linux release executables
        if: matrix.platform == 'linux'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          out="dist/release/linux-${RELEASE_ARCH}"
          mkdir -p "$out"
          install -m 755 target/release/nvoc-cli "$out/nvoc-cli-${RELEASE_VERSION}-linux-${RELEASE_ARCH}"
          install -m 755 target/release/nvoc-auto-optimizer "$out/nvoc-auto-optimizer-${RELEASE_VERSION}-linux-${RELEASE_ARCH}"
          install -m 755 target/release/cli-stressor-cuda-rs "$out/cli-stressor-cuda-rs-${RELEASE_VERSION}-linux-${RELEASE_ARCH}"
          install -m 755 tui/dist/nvoc-tui "$out/nvoc-tui-${RELEASE_VERSION}-linux-${RELEASE_ARCH}"
          install -m 755 gui/dist/NVOC-GUI "$out/nvoc-gui-${RELEASE_VERSION}-linux-${RELEASE_ARCH}"
          install -m 755 cli-stressor-opencl/dist/NVOC-CLI-Stressor-opencl "$out/nvoc-stressor-opencl-${RELEASE_VERSION}-linux-${RELEASE_ARCH}"

      - name: Stage Windows release executables
        if: matrix.platform == 'windows'
        env:
          RELEASE_VERSION: ${{ steps.version_windows.outputs.version }}
          RELEASE_ARCH: ${{ matrix.arch }}
        run: |
          $out = "dist/release/windows-$env:RELEASE_ARCH"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item target/release/nvoc-cli.exe "$out/nvoc-cli-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          Copy-Item target/release/nvoc-auto-optimizer.exe "$out/nvoc-auto-optimizer-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          Copy-Item target/release/cli-stressor-cuda-rs.exe "$out/cli-stressor-cuda-rs-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          Copy-Item tui/dist/nvoc-tui.exe "$out/nvoc-tui-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          Copy-Item gui/dist/NVOC-GUI.exe "$out/nvoc-gui-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          if ($env:RELEASE_ARCH -eq "amd64") {
            Copy-Item cli-stressor-opencl/dist/NVOC-CLI-Stressor-opencl.exe "$out/nvoc-stressor-opencl-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          }
          foreach ($name in @("nvoc_service", "install_service", "uninstall_service", "notify_service", "pause_continue", "service_config", "service_failure_actions")) {
            Copy-Item "target/release/$name.exe" "$out/nvoc-srv-$name-$env:RELEASE_VERSION-windows-$env:RELEASE_ARCH.exe"
          }

      - name: Verify Debian 12 / Ubuntu 22.04 Linux baseline
        if: matrix.platform == 'linux' && matrix.arch == 'amd64'
        run: |
          for image in debian:12 ubuntu:22.04; do
            docker run --rm -v "$PWD:/work:ro" -w /work "$image" \
              ./dist/release/linux-amd64/nvoc-cli-${{ steps.version.outputs.version }}-linux-amd64 --help
            docker run --rm -v "$PWD:/work:ro" -w /work "$image" \
              ./dist/release/linux-amd64/nvoc-auto-optimizer-${{ steps.version.outputs.version }}-linux-amd64 --help
            docker run --rm -v "$PWD:/work:ro" -w /work "$image" \
              ./dist/release/linux-amd64/cli-stressor-cuda-rs-${{ steps.version.outputs.version }}-linux-amd64 --help
          done

      - name: Upload matrix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvoc-release-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/nvoc-cli-*
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/nvoc-auto-optimizer-*
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/cli-stressor-cuda-rs-*
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/nvoc-tui-*
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/nvoc-gui-*
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/nvoc-stressor-opencl-*
            dist/release/${{ matrix.platform }}-${{ matrix.arch }}/nvoc-srv-*
          if-no-files-found: error
          retention-days: 14

  # Provenance attestations (SLSA). Users verify with:
  #   gh attestation verify <file> --repo <owner>/<repo>
  # push+tag only: a workflow_dispatch pointed at an existing tag is a dry
  # run and must never attest or publish.
  attest:
    name: attest provenance
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist/release-artifacts
          pattern: nvoc-release-*
          merge-multiple: true
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/release-artifacts/*

  publish:
    name: publish draft release
    needs: [build, attest]
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    # Configure required reviewers on the `release` environment so drafting
    # waits for human approval; publishing the draft is a second gate.
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          path: dist/release-artifacts
          pattern: nvoc-release-*
          merge-multiple: true

      - name: Build aggregate SHA256SUMS
        run: |
          cd dist/release-artifacts
          find . -maxdepth 1 -type f ! -name 'SHA256SUMS*' -printf '%f\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Draft NVOC release for $GITHUB_REF_NAME."
