on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.95.0

jobs:
  ruff-fmt:
    name: "ruff format . --check"
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
      - run: ruff format . --check --output-format=github

  ruff-lint:
    name: "ruff check ."
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
      - run: ruff check . --output-format=github

  fmt:
    name: Rustfmt
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      # cli-stressor-cuda-rs links against CUDA even without --all-features; exclude it here.
      # The Rust stressor is compiled separately in ci.yml when files change.
      - run: cargo clippy --workspace --exclude cli-stressor-cuda-rs --all-targets -- -D warnings
