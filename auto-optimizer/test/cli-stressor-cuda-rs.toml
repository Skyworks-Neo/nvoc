# Default CUDA stressor profile for cards with 8G+ VRAM.
# For 6G-8G cards, use cli-stressor-cuda-rs-6g-8g.toml.
fp64_matrix_sizes = [2048,4096]
precisions = ["bf16", "fp16", "fp32","tf32"]
validate_interval = 3.0
validate_size = 1024
transpose_prob = 0.5
seed = 12345
kernel_types = ["gemm", "memcpy", "memset"]
kernel_mixture = { gemm = 0.4, memcpy = 0.2, memset = 0.4 }
stream_mode = "dual"
disable_fp8 = true
vulkan_only = false
enable_vulkan_stress = true
vulkan_image_width = 255
vulkan_image_height = 511
vulkan_image_depth = 676
vulkan_image_count = 1
vulkan_image_msaa = 2
vulkan_minor_mixture_rate = 0.95

[kernel_params.gemm]
matrix_sizes = [4096,4097,8192,8193]
precisions = ["bf16", "fp16", "fp32","tf32"]
precision_weight = [0,0,0.5,0.5]
warmup_iters = 0
burst_iters = 10
minor_mixture_rate = 0.25
weight = 0.40

[kernel_params.memcpy]
matrix_sizes = [8192,12800,16384]
precisions = ["bf16", "fp16", "fp32","tf32"]
precision_weight = [0.0,0.0,1.0,0.0]
warmup_iters = 1
burst_iters = 25
minor_mixture_rate = 0.40
weight = 0.20

[kernel_params.memset]
matrix_sizes = [8192,12800,16384]
precisions = ["bf16", "fp16", "fp32","tf32"]
precision_weight = [0.0,0.0,1.0,0.0]
warmup_iters = 1
burst_iters = 50
minor_mixture_rate = 0.10
weight = 0.40

[kernel_params.elementwise]
matrix_sizes = [8192]
precisions = ["bf16",  "fp16", "fp32","tf32"]
precision_weight = [0.25,0.25,0.25,0.25]
burst_iters = 500
minor_mixture_rate = 0.20
weight = 0.00

[kernel_params.transpose]
matrix_sizes = [4096,8192]
precisions = ["bf16",  "fp16", "fp32","tf32"]
precision_weight = [0.25,0.25,0.25,0.25]
warmup_iters = 1
burst_iters = 500
minor_mixture_rate = 0.80
weight = 0.00

[kernel_params.reduction]
matrix_sizes = [8192,12800,16384,25600,32768]
precisions = ["bf16",  "fp16", "fp32","tf32"]
precision_weight = [0.25,0.25,0.25,0.25]
warmup_iters = 1
burst_iters = 500
minor_mixture_rate = 0.20
weight = 0.00
